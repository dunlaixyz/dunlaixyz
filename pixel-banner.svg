<svg viewBox="0 0 800 220" width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');

      @keyframes floatUp {
        0%   { transform: translateY(0);      opacity: 0; }
        15%  { opacity: 1; }
        100% { transform: translateY(-220px); opacity: 0; }
      }
      @keyframes titleColor {
        0%   { fill: #a78bfa; }
        20%  { fill: #f472b6; }
        40%  { fill: #38bdf8; }
        60%  { fill: #34d399; }
        80%  { fill: #fb923c; }
        100% { fill: #a78bfa; }
      }
      @keyframes subFade {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1;   }
      }
      @keyframes borderBlink {
        0%, 100% { stroke: #7c3aed; }
        50%       { stroke: #ec4899; }
      }
      @keyframes dashMove {
        from { stroke-dashoffset: 0;  }
        to   { stroke-dashoffset: -16; }
      }
      @keyframes scanline {
        0%   { transform: translateY(-10px); opacity: 0;    }
        10%  { opacity: 0.06; }
        90%  { opacity: 0.06; }
        100% { transform: translateY(230px); opacity: 0; }
      }
      @keyframes cornerPulse {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1;   }
      }

      .p { animation: floatUp 3s ease-in infinite; opacity: 0; }
      .title {
        font-family: 'Press Start 2P', monospace;
        font-size: 42px;
        animation: titleColor 5s ease-in-out infinite;
      }
      .sub {
        font-family: 'Press Start 2P', monospace;
        font-size: 12px;
        fill: #64748b;
        animation: subFade 3s ease-in-out infinite;
      }
      .b1 {
        stroke-dasharray: 4 4;
        animation: borderBlink 3s ease-in-out infinite, dashMove 1s linear infinite;
      }
      .b2 { animation: borderBlink 3s ease-in-out infinite; stroke-dasharray: none; }
      .scan { animation: scanline 4s linear infinite; }
      .cp { animation: cornerPulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="800" height="220" fill="#07070f"/>
  <rect width="800" height="220" fill="none" stroke="#0f0f2a" stroke-width="0"/>

  <rect x="0" y="0" width="800" height="4" fill="#1a0a3a" class="scan"/>

  <rect x="4"  y="4"  width="792" height="212" fill="none" stroke-width="1.5" rx="0" class="b1"/>
  <rect x="10" y="10" width="780" height="200" fill="none" stroke-width="0.6" rx="0" class="b2"/>

  <rect x="4"  y="4"  width="12" height="12" fill="#07070f" class="cp"/>
  <rect x="784" y="4"  width="12" height="12" fill="#07070f" class="cp" style="animation-delay:.5s"/>
  <rect x="4"  y="204" width="12" height="12" fill="#07070f" class="cp" style="animation-delay:1s"/>
  <rect x="784" y="204" width="12" height="12" fill="#07070f" class="cp" style="animation-delay:1.5s"/>

  <rect x="4"  y="4"  width="6" height="6" fill="#a78bfa" class="cp"/>
  <rect x="790" y="4"  width="6" height="6" fill="#f472b6" class="cp" style="animation-delay:.5s"/>
  <rect x="4"  y="210" width="6" height="6" fill="#38bdf8" class="cp" style="animation-delay:1s"/>
  <rect x="790" y="210" width="6" height="6" fill="#34d399" class="cp" style="animation-delay:1.5s"/>

  <rect class="p" x="40"  y="200" width="6" height="6" fill="#a78bfa" style="animation-delay:0s"/>
  <rect class="p" x="100" y="190" width="5" height="5" fill="#f472b6" style="animation-delay:0.4s"/>
  <rect class="p" x="180" y="205" width="7" height="7" fill="#38bdf8" style="animation-delay:0.8s"/>
  <rect class="p" x="260" y="195" width="5" height="5" fill="#34d399" style="animation-delay:1.2s"/>
  <rect class="p" x="340" y="208" width="6" height="6" fill="#fb923c" style="animation-delay:1.6s"/>
  <rect class="p" x="420" y="192" width="5" height="5" fill="#a78bfa" style="animation-delay:0.2s"/>
  <rect class="p" x="500" y="203" width="7" height="7" fill="#f472b6" style="animation-delay:0.6s"/>
  <rect class="p" x="580" y="196" width="5" height="5" fill="#38bdf8" style="animation-delay:1.0s"/>
  <rect class="p" x="650" y="207" width="6" height="6" fill="#34d399" style="animation-delay:1.4s"/>
  <rect class="p" x="730" y="194" width="5" height="5" fill="#fb923c" style="animation-delay:1.8s"/>
  <rect class="p" x="70"  y="198" width="4" height="4" fill="#f472b6" style="animation-delay:2.1s"/>
  <rect class="p" x="220" y="202" width="4" height="4" fill="#a78bfa" style="animation-delay:2.4s"/>
  <rect class="p" x="460" y="199" width="4" height="4" fill="#34d399" style="animation-delay:2.7s"/>
  <rect class="p" x="690" y="204" width="4" height="4" fill="#38bdf8" style="animation-delay:0.9s"/>
  <rect class="p" x="760" y="197" width="4" height="4" fill="#fb923c" style="animation-delay:2.2s"/>

  <text x="400" y="118" text-anchor="middle" class="title">DUNLAI</text>
  <text x="400" y="158" text-anchor="middle" class="sub">HoangTuDun  !!?</text>

  <rect x="195" y="170" width="4" height="4" fill="#a78bfa" opacity="0.5"/>
  <rect x="210" y="170" width="4" height="4" fill="#f472b6" opacity="0.5"/>
  <rect x="225" y="170" width="4" height="4" fill="#38bdf8" opacity="0.5"/>
  <rect x="371" y="170" width="4" height="4" fill="#34d399" opacity="0.5"/>
  <rect x="386" y="170" width="4" height="4" fill="#a78bfa" opacity="0.5"/>
  <rect x="401" y="170" width="4" height="4" fill="#f472b6" opacity="0.5"/>
  <rect x="569" y="170" width="4" height="4" fill="#38bdf8" opacity="0.5"/>
  <rect x="584" y="170" width="4" height="4" fill="#34d399" opacity="0.5"/>
  <rect x="599" y="170" width="4" height="4" fill="#fb923c" opacity="0.5"/>
</svg>
