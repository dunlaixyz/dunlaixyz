<svg viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c1a"/>
      <stop offset="100%" stop-color="#130920"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="20" y="52" width="760" height="96"/>
    </clipPath>
    <style>
      @keyframes scroll {
        0%   { transform: translateX(820px);   }
        100% { transform: translateX(-1800px); }
      }
      @keyframes colorCycle {
        0%   { fill: #a78bfa; }
        20%  { fill: #f472b6; }
        40%  { fill: #38bdf8; }
        60%  { fill: #34d399; }
        80%  { fill: #fb923c; }
        100% { fill: #a78bfa; }
      }
      @keyframes borderPulse {
        0%, 100% { stroke: #7c3aed; }
        50%       { stroke: #db2777; }
      }
      @keyframes dashFlow {
        from { stroke-dashoffset: 0;   }
        to   { stroke-dashoffset: -52; }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1;   }
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.15; }
        50%       { opacity: 0.5;  }
      }
      .txt {
        font-family: 'Courier New', Courier, monospace;
        font-size: 46px;
        font-weight: 900;
        letter-spacing: 3px;
        animation: scroll 15s linear infinite, colorCycle 5s ease-in-out infinite;
      }
      .b1 { animation: borderPulse 3s ease-in-out infinite; }
      .b2 {
        stroke-dasharray: 8 5;
        animation: borderPulse 3s ease-in-out infinite, dashFlow 2s linear infinite;
      }
      .tag  {
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        animation: blink 3s ease-in-out infinite;
      }
      .dots {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        letter-spacing: 4px;
        fill: #3b1f6e;
        animation: blink 2.5s ease-in-out infinite;
      }
      .gline { animation: shimmer 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="800" height="200" fill="url(#bg)"/>

  <line x1="0"   y1="48"  x2="800" y2="48"  stroke="#1a1a35" stroke-width="1" class="gline"/>
  <line x1="0"   y1="152" x2="800" y2="152" stroke="#1a1a35" stroke-width="1" class="gline" style="animation-delay:1.5s"/>

  <rect x="4"  y="4"  width="792" height="192" rx="8" fill="none" stroke-width="1.8" class="b1"/>
  <rect x="11" y="11" width="778" height="178" rx="5" fill="none" stroke-width="0.8" class="b2"/>

  <text x="20"  y="36"  class="tag" fill="#7c3aed">┌──[ dunlai@dev ]</text>
  <text x="600" y="36"  class="tag" fill="#7c3aed">[ 2025 ]──┐</text>
  <text x="20"  y="193" class="tag" fill="#7c3aed">└──[ status: online ]</text>
  <text x="572" y="193" class="tag" fill="#7c3aed">[ v1.0.0 ]──┘</text>

  <g clip-path="url(#clip)">
    <text y="114" class="txt">dunlaixyz  ◆  hoangtudun  ◆  dunlaixyz  ◆  hoangtudun  ◆</text>
  </g>

  <text x="400" y="174" text-anchor="middle" class="dots">· · · · · · · · · · · · · · · · · · · · · · · · · ·</text>
</svg>
